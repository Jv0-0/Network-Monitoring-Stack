services:

  # ── TAILSCALE ──────────────────────────────────────────
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ZNG
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--reset --accept-dns=false --advertise-routes=172.19.0.0/16 --accept-routes
      - TS_USERSPACE=true
    volumes:
      - tailscale-state:/var/lib/tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - monitoring
    restart: unless-stopped

  # ── NGINX PROXY ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
      - zabbix-web
      - grafana
      - n8n
      - open-webui
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  # ── POSTGRESQL ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitoring
    restart: unless-stopped

  # ── ZABBIX SERVER ──────────────────────────────────────
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-latest
    container_name: zabbix-server
    cap_add:
      - NET_RAW
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - postgres
    networks:
      - monitoring
    restart: unless-stopped

  # ── ZABBIX WEB ─────────────────────────────────────────
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Bogota
      ZBX_SERVER_NAME: ZNG-Zabbix
      PHP_FPM_PM_MAX_CHILDREN: 50
    depends_on:
      - postgres
      - zabbix-server
    networks:
      - monitoring
    restart: unless-stopped

  # ── GRAFANA ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: alexanderzobnin-zabbix-app
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - zabbix-server
    networks:
      - monitoring
    restart: unless-stopped

  # ── N8N ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    environment:
      - TZ=America/Bogota
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_USER_FOLDER=/home/node/.n8n
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_WEBHOOK_URL}
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped

  # ── OPEN WEBUI ─────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    environment:
      - OPENAI_API_BASE_URL=https://openrouter.ai/api/v1
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - WEBUI_SECRET_KEY=${OPENWEBUI_SECRET_KEY}
      - DEFAULT_MODELS=meta-llama/llama-3.3-70b-instruct:free
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  tailscale-state:
  postgres-data:
  grafana-data:
  n8n-data:
  open-webui-data:
